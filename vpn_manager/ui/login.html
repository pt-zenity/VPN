<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPN Manager — Sign In</title>
<style>
:root {
  --bg: #f0f2f5;
  --surface: #ffffff;
  --ink: #111827;
  --ink-2: #374151;
  --muted: #6b7280;
  --faint: #9ca3af;
  --border: #e5e7eb;
  --border-strong: #d1d5db;
  --accent: #1f6f6b;
  --accent-2: #185e5a;
  --accent-soft: #eef8f7;
  --stop: #dc2626;
  --stop-soft: #fef2f2;
  --shadow-lg: 0 12px 40px rgba(0,0,0,.13), 0 4px 14px rgba(0,0,0,.07);
  --r: 12px;
  --r-lg: 16px;
  --r-xl: 20px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { height: 100%; }
body {
  background: var(--bg);
  color: var(--ink);
  min-height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  font: 15px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  -webkit-font-smoothing: antialiased;
}
body::before {
  content: '';
  position: fixed;
  top: -30%; left: -20%;
  width: 70%; height: 70%;
  background: radial-gradient(ellipse at center, rgba(31,111,107,.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed;
  bottom: -20%; right: -15%;
  width: 60%; height: 60%;
  background: radial-gradient(ellipse at center, rgba(31,111,107,.05) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}
.login-wrapper {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 400px;
}
.login-brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 24px;
}
.login-brand-icon {
  width: 40px; height: 40px;
  background: var(--accent);
  border-radius: var(--r);
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(31,111,107,.35);
  flex-shrink: 0;
}
.login-brand-icon svg { width: 20px; height: 20px; fill: #fff; }
.login-brand-name {
  font-size: 17px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -.02em;
}
.login-brand-name span { color: var(--accent); }
.card {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-xl);
  padding: 36px 32px 32px;
  box-shadow: var(--shadow-lg);
}
.card-head { margin-bottom: 26px; }
.card-head h1 {
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -.03em;
  color: var(--ink);
  line-height: 1.3;
}
.card-head p {
  color: var(--muted);
  font-size: 14px;
  margin-top: 5px;
  min-height: 1em;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: var(--ink-2);
  margin-bottom: 7px;
}
.field input {
  width: 100%;
  font: inherit;
  font-size: 15px;
  padding: 11px 14px;
  border: 1.5px solid var(--border-strong);
  border-radius: var(--r);
  background: var(--surface);
  color: var(--ink);
  transition: border-color .15s, box-shadow .15s;
  outline: none;
  -webkit-appearance: none;
}
.field input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
.field input::placeholder { color: var(--faint); }
.btn-submit {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  margin-top: 22px;
  padding: 13px;
  border: none;
  background: var(--accent);
  color: #fff;
  font: inherit;
  font-size: 15px;
  font-weight: 700;
  border-radius: var(--r);
  cursor: pointer;
  letter-spacing: -.01em;
  transition: background .15s, transform .1s, box-shadow .15s;
  box-shadow: 0 3px 12px rgba(31,111,107,.3);
}
.btn-submit:hover {
  background: var(--accent-2);
  box-shadow: 0 5px 18px rgba(31,111,107,.35);
}
.btn-submit:active { transform: translateY(1px); }
.error {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  margin-bottom: 20px;
  padding: 12px 14px;
  background: var(--stop-soft);
  color: var(--stop);
  border: 1px solid #fca5a5;
  border-radius: var(--r);
  font-size: 14px;
  line-height: 1.5;
}
.error::before {
  content: '!';
  flex-shrink: 0;
  width: 20px; height: 20px;
  background: var(--stop);
  color: #fff;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 700;
  margin-top: 1px;
}
.login-footer {
  text-align: center;
  margin-top: 18px;
  font-size: 12.5px;
  color: var(--faint);
}
@media (max-width: 480px) {
  body { padding: 16px; align-items: flex-start; padding-top: 40px; }
  .card { padding: 28px 22px 24px; border-radius: var(--r-lg); }
  .login-brand { margin-bottom: 18px; }
  .card-head h1 { font-size: 20px; }
}
@media (max-width: 360px) {
  .card { padding: 22px 16px 20px; }
}
</style>
</head>
<body>
<div class="login-wrapper">
  <div class="login-brand">
    <div class="login-brand-icon">
      <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <path d="M10 1L3 4.5v5.25C3 13.7 6.1 17.35 10 19c3.9-1.65 7-5.3 7-9.25V4.5L10 1z"/>
      </svg>
    </div>
    <div class="login-brand-name">VPN <span>Manager</span></div>
  </div>

  <form class="card" method="post" action="/login">
    <div class="card-head">
      <h1>Sign in to the panel</h1>
      <p><!--SUBTITLE--></p>
    </div>

    <!--ERROR-->
    <!--CREDS-->
    <div class="field">
      <label for="u">Username</label>
      <input id="u" name="username" type="text"
             autocomplete="username" autofocus required
             placeholder="Enter your username">
    </div>
    <div class="field">
      <label for="p">Password</label>
      <input id="p" name="password" type="password"
             autocomplete="current-password" required
             placeholder="Enter your password">
    </div>
    <!--/CREDS-->

    <!--CODE-->
    <div class="field">
      <label for="c">Verification code</label>
      <input id="c" name="code" type="text"
             inputmode="numeric" autocomplete="one-time-code"
             pattern="[0-9 ]*" maxlength="10" autofocus required
             placeholder="6-digit code from your app">
    </div>
    <!--/CODE-->

    <button class="btn-submit" type="submit"><!--BUTTON--></button>
  </form>

  <div class="login-footer">Secured with end-to-end encryption</div>
</div>
</body>
</html>
